name: Build XPHearts
on: 
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # This line creates the manual "Run workflow" button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'oracle' # Highest compatibility for Java 25
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Upload Plugin JAR
      uses: actions/upload-artifact@v4
      with:
        name: XPHearts-26.1.2-JAR
        path: target/*.jar
